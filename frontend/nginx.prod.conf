# nginx config for the production frontend container.
#
# - Serves the SPA bundle at /
# - Reverse-proxies /api/* to the backend container on Docker's internal
#   network. The backend is not directly reachable from outside the host;
#   only nginx's port (mapped to 127.0.0.1:80) accepts traffic.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed assets, no-cache the entry HTML.
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback — serve index.html for any non-asset path.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
