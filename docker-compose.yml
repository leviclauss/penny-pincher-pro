services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    image: wheel-screener-backend:dev
    volumes:
      - ./backend:/app
      - ./data:/data
    env_file: .env
    environment:
      - DATABASE_URL=sqlite:////data/wheel.db
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/system/health').read()"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3
    command: sh -c "alembic upgrade head && exec uvicorn api.main:app --reload --host 0.0.0.0 --port 8000"

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_PROXY_TARGET=http://backend:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      backend:
        condition: service_healthy
