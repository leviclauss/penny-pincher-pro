name: Build and deploy production images

# Builds the prod Dockerfile targets, pushes to GHCR on main, then SSHes
# into the Lightsail box (via Tailscale) and pulls the new images. The
# server never compiles anything — see DEPLOYMENT.md for the full flow.

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.prod.yml"
      - ".github/workflows/build-prod-images.yml"
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.prod.yml"
      - ".github/workflows/build-prod-images.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            target: prod
          - image: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            target: prod
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          repo="${{ github.repository_owner }}/penny-pincher-pro-${{ matrix.image }}"
          repo_lower="$(echo "$repo" | tr '[:upper:]' '[:lower:]')"
          {
            echo "name=ghcr.io/$repo_lower"
            echo "sha_tag=ghcr.io/$repo_lower:${{ github.sha }}"
            echo "latest_tag=ghcr.io/$repo_lower:latest"
          } >> "$GITHUB_OUTPUT"

      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ steps.tags.outputs.sha_tag }}
            ${{ steps.tags.outputs.latest_tag }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  deploy:
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Pull and restart on Lightsail
        env:
          GITHUB_SHA: ${{ github.sha }}
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_USER: ${{ secrets.LIGHTSAIL_USER }}
        run: |
          set -euo pipefail
          tailscale ssh "${LIGHTSAIL_USER}@${LIGHTSAIL_HOST}" bash -s <<EOF
          set -euo pipefail
          cd /opt/penny-pincher-pro
          git fetch origin main
          git checkout -f "${GITHUB_SHA}"
          export IMAGE_TAG="${GITHUB_SHA}"
          docker compose -f docker-compose.prod.yml pull
          docker compose -f docker-compose.prod.yml up -d
          docker image prune -f
          EOF
