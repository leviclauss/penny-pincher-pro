# Production compose. Pull-only: images are built and pushed by GitHub
# Actions (.github/workflows/build-prod-images.yml). The server never
# compiles anything — it only does:
#
#   IMAGE_TAG=<sha-or-latest> docker compose -f docker-compose.prod.yml pull
#   IMAGE_TAG=<sha-or-latest> docker compose -f docker-compose.prod.yml up -d
#
# Both services bind only to 127.0.0.1 — exposure to the personal Tailscale
# network is the operator's job (see docs/deploy.md). No public ingress.

services:
  backend:
    image: ghcr.io/leviclauss/penny-pincher-pro-backend:${IMAGE_TAG:-latest}
    restart: always
    env_file: .env
    environment:
      - APP_ENV=prod
      - DATABASE_URL=sqlite:////data/wheel.db
      - LOG_JSON=true
    volumes:
      - data:/data
      - backups:/backups
    ports:
      - "127.0.0.1:8000:8000"

  frontend:
    image: ghcr.io/leviclauss/penny-pincher-pro-frontend:${IMAGE_TAG:-latest}
    restart: always
    ports:
      - "127.0.0.1:80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  data:
  backups:
