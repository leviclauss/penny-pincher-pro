# Production compose. Run on the server with:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Both services bind only to 127.0.0.1 — exposure to the personal Tailscale
# network is the operator's job (see docs/deploy.md). No public ingress.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: prod
    image: wheel-screener-backend:prod
    restart: always
    env_file: .env
    environment:
      - APP_ENV=prod
      - DATABASE_URL=sqlite:////data/wheel.db
      - LOG_JSON=true
    volumes:
      - data:/data
      - backups:/backups
    ports:
      - "127.0.0.1:8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
    image: wheel-screener-frontend:prod
    restart: always
    volumes:
      - ./frontend/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "127.0.0.1:80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  data:
  backups:
